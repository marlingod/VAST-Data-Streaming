# =============================================================================
# Kafka Ecosystem Stack for Fraud Detection Demo
# =============================================================================
# This docker-compose demonstrates the operational complexity of a typical
# Kafka-based streaming pipeline. Note the number of separate systems required:
#   1. Zookeeper  — coordination service for Kafka
#   2. Kafka      — message broker
#   3. Schema Registry — schema management
#   4. MinIO      — S3-compatible object store (tiered storage target)
#   5. ClickHouse — OLAP database for historical queries
#   6. Faust      — stream processing application
#
# Compare this to the VAST pipeline which consolidates all of these roles
# into a single platform.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Zookeeper — required by Kafka for cluster coordination
  # In production you'd also need to manage Zookeeper's own availability.
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-demo-net

  # ---------------------------------------------------------------------------
  # Kafka Broker — the message bus
  # Note: requires Zookeeper to be healthy before starting.
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - fraud-demo-net

  # ---------------------------------------------------------------------------
  # Schema Registry — yet another service to manage, just for schema evolution
  # ---------------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    hostname: schema-registry
    container_name: schema-registry
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-demo-net

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store for Kafka tiered storage (KIP-405)
  # In the VAST world, the storage platform handles tiering natively.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-demo-net

  # ---------------------------------------------------------------------------
  # MinIO bucket initializer — creates the tiered-storage bucket on startup
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing myminio/kafka-tiered-storage;
      echo 'Bucket kafka-tiered-storage created';
      "
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - fraud-demo-net

  # ---------------------------------------------------------------------------
  # ClickHouse — OLAP database for historical fraud queries
  # This is the THIRD data system in the pipeline (after Kafka and MinIO).
  # Note: port 9000 remapped to 9100 to avoid conflict with MinIO.
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    hostname: clickhouse
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9100:9000"
    volumes:
      - ./historical/clickhouse_setup.sql:/docker-entrypoint-initdb.d/clickhouse_setup.sql
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - fraud-demo-net

  # ---------------------------------------------------------------------------
  # Faust Stream Processor — the fraud scoring application
  # This is the application code that stitches Kafka + ClickHouse together.
  # ---------------------------------------------------------------------------
  faust-scorer:
    build:
      context: ./fraud_scorer/
    hostname: faust-scorer
    container_name: faust-scorer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - fraud-demo-net

networks:
  fraud-demo-net:
    driver: bridge

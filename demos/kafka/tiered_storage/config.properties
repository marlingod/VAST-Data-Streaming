# =============================================================================
# Tiered Storage Configuration (KIP-405)
# =============================================================================
# These broker-level properties enable Kafka's tiered storage feature,
# allowing older log segments to be offloaded to remote storage (e.g., S3/MinIO).
#
# In the VAST architecture, tiered storage is handled natively by the platform —
# no additional configuration, no separate object store, no extra plugins.
# =============================================================================

remote.log.storage.system.enable=true
remote.log.storage.manager.class.name=org.apache.kafka.server.log.remote.storage.LocalTieredStorage
remote.log.manager.task.interval.ms=5000
remote.log.metadata.manager.class.name=org.apache.kafka.server.log.remote.metadata.storage.TopicBasedRemoteLogMetadataManager
remote.log.metadata.manager.listener.name=PLAINTEXT

# Note: In production, use S3-compatible RSM plugin
# This demo uses local tiered storage for simplicity
# Production would use: remote.log.storage.manager.class.name=io.confluent.kafka.RemoteStorageManager


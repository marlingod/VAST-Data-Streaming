# VAST DataEngine Function Definition
# Usage: vastde functions create --config @function-fraud-scorer.yaml
#
# Before running, ensure:
#   1. Docker image built: vastde functions build fraud-scorer
#   2. Image pushed to registry: docker push <registry>/fraud-scorer:v1.0
#   3. Container registry configured in VAST DataEngine UI

name: fraud-scorer
description: >
  Real-time fraud detection scoring function. Scores financial transactions
  using 5 weighted rules (velocity, geographic impossibility, amount anomaly,
  card testing, fraud ring). Publishes scored transactions to
  fraud.transactions.scored and high-risk alerts (score >= 0.8) to fraud.alerts.

# Container image
container_registry: dockerhub-de
artifact_source: malingod/fraud-scorer
image_tag: v1.0

# Function settings
runtime: python
handler: main
publish: true

# Resource defaults (overridden in pipeline manifest)
resources:
  min_cpu: 100m
  max_cpu: 500m
  min_memory: 128Mi
  max_memory: 256Mi
